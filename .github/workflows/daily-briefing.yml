name: Daily News Briefing

on:
  schedule:
    - cron: '0 22 * * *'   # 每天 22:00（北京时间）运行
  workflow_dispatch:       # 支持手动触发

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: ① 检出代码
        uses: actions/checkout@v4

      - name: ② 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ③ 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: ④ 生成新闻简报
        run: |
          python scripts/fetch_news.py --source all --limit 20 --output daily_briefing.md || echo "生成失败，但继续"
          python scripts/fetch_news.py --source finance --limit 15 --output finance_briefing.md || echo "生成失败，但继续"
          python scripts/fetch_news.py --source tech --limit 15 --output tech_briefing.md || echo "生成失败，但继续"

      - name: ⑤ 提交并推送
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add *.md 2>/dev/null || echo "无 MD 文件可添加"
          git diff --staged --quiet || git commit -m "Auto update news briefing [skip ci]"
          git push
