name: Daily News Briefing

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: ① 检出代码
        uses: actions/checkout@v4

      - name: ② 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ③ 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: ④ 安装 Playwright 浏览器
        run: |
          playwright install chromium
          playwright install-deps

      - name: ⑤ 生成新闻简报
        run: |
          mkdir -p output
          python scripts/fetch_news.py --source all --limit 20 --outdir output/ --no-save || echo "生成失败，但继续"

      - name: ⑥ 提交并推送
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.md 2>/dev/null || echo "无 MD 文件"
          git diff --staged --quiet || git commit -m "Auto update news briefing [skip ci]"
          git push
